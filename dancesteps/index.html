<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Dance Steps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Animated SVG Dance Steps</h1>
    <div class="animation-container">
       <svg id="dance-animation" width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="left-footprint">
      <path d="M4 18h5.5v1.25a2.75 2.75 0 1 1-5.5 0V18zM8 6.12c2 0 3 2.88 3 4.88 0 1-.5 2-1 3.5L9.5 16H4c0-1-.5-2.5-.5-5S5.498 6.12 8 6.12z" />
    </g>
    <g id="right-footprint">
      <path d="M12.554 13.978l-.217 1.231a2.75 2.75 0 0 1-5.417-.955l.218-1.23 5.416.954zM6.178 1.705c2.464.434 4.018 3.124 3.584 5.586-.434 2.463-1.187 3.853-1.36 4.838l-5.417-.955-.232-1.564c-.232-1.564-.55-2.636-.377-3.62.347-1.97 1.832-4.632 3.802-4.285z" transform="translate(24,0) scale(-1,1)"/>
    </g>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>

  <g class="dance-path-1">
    <path class="trace-line" d="M 60,150 C 120,100, 180,100, 240,150" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <use href="#left-footprint" class="step" transform="translate(40, 125) scale(1.5) rotate(-20)"/>
    <use href="#right-footprint" class="step" transform="translate(225, 120) scale(1.5) rotate(15)"/>
  </g>

  <g class="dance-path-2">
    <path class="trace-line" d="M 320,250 C 370,200, 430,220, 480,240" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <path class="trace-line" d="M 520,190 C 580,120, 620,140, 680,200" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    
    <use href="#left-footprint" class="step" transform="translate(300, 225) scale(1.5) rotate(-25)"/>
    <use href="#right-footprint" class="step" transform="translate(410, 215) scale(1.5) rotate(5)"/>
    <use href="#left-footprint" class="step" transform="translate(465, 165) scale(1.5) rotate(-10)"/>
    <use href="#right-footprint" class="step" transform="translate(550, 105) scale(1.5) rotate(-70)"/>
    <use href="#left-footprint" class="step" transform="translate(660, 175) scale(1.5) rotate(10)"/>
  </g>

  <g class="dance-path-3">
    <path class="trace-line" d="M 750,250 C 800,300, 860,280, 920,240" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <path class="trace-line" d="M 920,240 C 980,180, 1050,180, 1100,220" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    
    <use href="#right-footprint" class="step" transform="translate(730, 205) scale(1.5) rotate(-5)"/>
    <use href="#left-footprint" class="step" transform="translate(830, 245) scale(1.5) rotate(20)"/>
    <use href="#right-footprint" class="step" transform="translate(910, 185) scale(1.5) rotate(-15)"/>
    <use href="#left-footprint" class="step" transform="translate(1000, 145) scale(1.5) rotate(-35)"/>
    <use href="#right-footprint" class="step" transform="translate(1100, 185) scale(1.5) rotate(15)"/>
  </g>
</svg>
    </div>
    
    <button id="animateButton">Animate Steps</button>

    <script src="script.js"></script>
</body>
</html>
